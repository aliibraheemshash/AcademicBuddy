<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Research Vault Community</title>
  <style>
    :root {
      --primary: #4f46e5;
      --secondary: #9333ea;
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
      --text-main: #f8fafc;
      --text-muted: #cbd5e1;
      --accent: #ffd700;
    }

    body {
      font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: var(--text-main);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
    }

    /* Background Animation Elements */
    #background-shapes {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .shape {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      will-change: transform;
    }

    .shape1 {
      width: 400px; height: 400px;
      background: var(--primary);
      top: -10%; left: -10%;
    }

    .shape2 {
      width: 500px; height: 500px;
      background: var(--secondary);
      bottom: -20%; right: -10%;
    }

    /* Layout Structure */
    header {
      padding: 40px 0 10px;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    h1 {
      margin: 0;
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(to right, #fff, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }

    #user-count {
      text-align: center;
      margin: 10px 0 30px;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 1px;
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    main {
      width: 90%;
      max-width: 460px;
      margin: 0 auto 50px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      position: relative;
      z-index: 3;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    /* Form Elements */
    .input-group {
      margin-bottom: 22px;
      position: relative;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .label-hint {
      color: var(--accent);
      font-weight: 500;
      text-transform: none;
      font-size: 0.75rem;
      float: right;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper svg {
      position: absolute;
      left: 16px;
      width: 20px;
      height: 20px;
      fill: #64748b;
      transition: fill 0.3s ease;
    }

    input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 1rem;
      background: rgba(15, 23, 42, 0.4);
      color: #fff;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }

    input::placeholder { color: #64748b; }

    input:focus {
      outline: none;
      background: rgba(15, 23, 42, 0.8);
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.2);
    }

    input:focus + svg, input:not(:placeholder-shown) + svg {
      fill: var(--primary);
    }

    /* Autofill Loading Text */
    .autofill-status {
      position: absolute;
      right: 16px;
      font-size: 0.8rem;
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .autofill-status.active { opacity: 1; }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 16px;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      box-shadow: 0 10px 25px -5px rgba(147, 51, 234, 0.5);
      transition: all 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 35px -5px rgba(147, 51, 234, 0.6);
    }

    button:active { transform: translateY(1px); }

    /* Custom Toast Notification */
    #toast {
      visibility: hidden;
      min-width: 250px;
      background-color: #333;
      color: #fff;
      text-align: center;
      border-radius: 10px;
      padding: 16px;
      position: fixed;
      z-index: 10;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      font-weight: 500;
    }

    #toast.show {
      visibility: visible;
      animation: fadein 0.5s, fadeout 0.5s 2.5s;
    }

    @keyframes fadein {
      from {bottom: 0; opacity: 0;}
      to {bottom: 30px; opacity: 1;}
    }

    @keyframes fadeout {
      from {bottom: 30px; opacity: 1;}
      to {bottom: 0; opacity: 0;}
    }

    .footer {
      margin-top: auto;
      text-align: center;
      padding: 30px 0;
      font-size: 0.85rem;
      color: var(--text-muted);
      position: relative;
      z-index: 2;
    }
  </style>
</head>
<body>

<div id="background-shapes">
  <div class="shape shape1"></div>
  <div class="shape shape2"></div>
</div>

<header>
  <h1>Research Vault</h1>
</header>

<div id="user-count">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
  People helped so far: <span id="count-number">0</span>
</div>

<main>
  <form id="requestForm" action="https://formsubmit.co/researchvault.books@gmail.com" method="POST">
    <input type="hidden" name="_captcha" value="false" />
    <input type="hidden" name="_template" value="table" />
    <input type="hidden" name="_next" value="https://aliibraheemshash.github.io/thankyou.html" />

    <input type="hidden" name="_subject" id="form-subject" value="New Research Request" />

    <div class="input-group">
      <label for="email">Your Email <span class="label-hint">Required</span></label>
      <div class="input-wrapper">
        <input type="email" id="email" name="email" placeholder="scholar@university.edu" required />
        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
      </div>
    </div>

    <div class="input-group">
      <label for="doi">Paper DOI <span class="label-hint">Autofills Paper</span></label>
      <div class="input-wrapper">
        <input type="text" id="doi" name="doi" placeholder="10.xxxx/xxxxx" />
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
        <span class="autofill-status" id="doi-status">Searching...</span>
      </div>
    </div>

    <div class="input-group">
      <label for="isbn">Book ISBN <span class="label-hint">Autofills Book</span></label>
      <div class="input-wrapper">
        <input type="text" id="isbn" name="isbn" placeholder="e.g. 9781234567890" />
        <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12zM10 9h8v2h-8zm0 3h4v2h-4zm0-6h8v2h-8z"/></svg>
        <span class="autofill-status" id="isbn-status">Searching...</span>
      </div>
    </div>

    <div class="input-group">
      <label for="title">Title</label>
      <div class="input-wrapper">
        <input type="text" id="title" name="title" placeholder="Extracted title appears here" />
        <svg viewBox="0 0 24 24"><path d="M5 4v3h5.5v12h3V7H19V4z"/></svg>
      </div>
    </div>

    <div class="input-group">
      <label for="author">Author(s)</label>
      <div class="input-wrapper">
        <input type="text" id="author" name="author" placeholder="Extracted authors appear here" />
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      </div>
    </div>

    <button type="submit" id="submitBtn">
      <span>Submit Request</span>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
  </form>
</main>

<div class="footer">
  &copy; 2026 Research Vault Community | Designed for Scholars
</div>

<div id="toast">Message goes here</div>

<script>
  // --- 1. BACKGROUND FLOATING SHAPES ---
  const shapes = document.querySelectorAll('.shape');
  let angle = 0;

  function animateShapes() {
    angle += 0.01;
    shapes[0].style.transform = `translate(${Math.sin(angle) * 50}px, ${Math.cos(angle) * 50}px) scale(${1 + Math.sin(angle * 2) * 0.1})`;
    shapes[1].style.transform = `translate(${Math.cos(angle) * -50}px, ${Math.sin(angle) * -50}px) scale(${1 + Math.cos(angle * 2) * 0.1})`;
    requestAnimationFrame(animateShapes);
  }
  animateShapes();

  // --- 2. CUSTOM TOAST NOTIFICATION ---
  function showToast(message, isError = false) {
    const toast = document.getElementById("toast");
    toast.textContent = message;
    toast.style.backgroundColor = isError ? "#e11d48" : "#10b981";
    toast.className = "show";
    setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
  }

  // --- 3. ADVANCED AUTOFILL (DOI & ISBN) ---
  function toggleStatus(elementId, show, text = "Searching...") {
    const el = document.getElementById(elementId);
    el.textContent = text;
    if(show) el.classList.add('active');
    else el.classList.remove('active');
  }

  // Autofill via Crossref for DOI
  document.getElementById('doi').addEventListener('blur', async (e) => {
    const doi = e.target.value.trim();
    if (!doi) return;

    toggleStatus('doi-status', true);
    try {
      const response = await fetch(`https://api.crossref.org/works/${encodeURIComponent(doi)}`);
      if (response.ok) {
        const data = await response.json();
        const item = data.message;
        document.getElementById('title').value = item.title ? item.title[0] : '';
        if (item.author) document.getElementById('author').value = item.author.map(a => `${a.given || ''} ${a.family || ''}`).join(', ').trim();
        toggleStatus('doi-status', true, "✓ Found");
        setTimeout(() => toggleStatus('doi-status', false), 2000);
      } else {
        toggleStatus('doi-status', true, "Not Found");
        setTimeout(() => toggleStatus('doi-status', false), 2000);
      }
    } catch (err) {
      toggleStatus('doi-status', false);
    }
  });

  // Autofill via OpenLibrary for ISBN
  document.getElementById('isbn').addEventListener('blur', async (e) => {
    const isbn = e.target.value.replace(/[- ]/g, '').trim();
    if (isbn.length < 10) return;

    toggleStatus('isbn-status', true);
    try {
      const response = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&jscmd=data&format=json`);
      if (response.ok) {
        const data = await response.json();
        const bookKey = `ISBN:${isbn}`;
        if(data[bookKey]) {
          const book = data[bookKey];
          document.getElementById('title').value = book.title || '';
          if (book.authors) document.getElementById('author').value = book.authors.map(a => a.name).join(', ');
          toggleStatus('isbn-status', true, "✓ Found");
          setTimeout(() => toggleStatus('isbn-status', false), 2000);
        } else {
          toggleStatus('isbn-status', true, "Not Found");
          setTimeout(() => toggleStatus('isbn-status', false), 2000);
        }
      }
    } catch (err) {
      toggleStatus('isbn-status', false);
    }
  });

  // --- 4. SUBMISSION LOGIC & DYNAMIC EMAIL SUBJECT ---
  const form = document.getElementById('requestForm');
  const countSpan = document.getElementById('count-number');
  let submissionCount = Number(localStorage.getItem('submissionCount')) || 0;

  function updateCount() { countSpan.textContent = submissionCount; }
  updateCount();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const emailVal = document.getElementById('email').value.trim();
    const doi = document.getElementById('doi').value.trim();
    const isbn = document.getElementById('isbn').value.trim();
    const title = document.getElementById('title').value.trim();

    if (!doi && !isbn && !title) {
      showToast('Please provide at least a DOI, ISBN, or Title.', true);
      return;
    }

    // --- Dynamic Subject Creation ---
    // Extract everything before the '@' sign
    let extractedName = emailVal.split('@')[0];
    // Replace dots and underscores with spaces, and strip out numbers
    extractedName = extractedName.replace(/[._]/g, ' ').replace(/[0-9]/g, '').trim();
    // Capitalize the first letter of each word (e.g. john doe -> John Doe)
    extractedName = extractedName.replace(/\b\w/g, char => char.toUpperCase());

    // Fallback just in case the string becomes empty after cleaning
    if (!extractedName) extractedName = "a Scholar";

    // Set the hidden FormSubmit subject field
    document.getElementById('form-subject').value = `Request from ${extractedName}`;
    // ---------------------------------

    const btn = document.getElementById('submitBtn');
    const originalBtnHTML = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = `<span>Sending Request...</span>`;

    try {
      const response = await fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      });

      if (response.ok) {
        showToast('Request submitted! We will respond shortly.');
        submissionCount++;
        localStorage.setItem('submissionCount', submissionCount);
        updateCount();
        form.reset();
      } else {
        showToast('Submission failed. Fallback triggered.', true);
        setTimeout(() => form.submit(), 1500);
      }
    } catch (err) {
      form.submit(); // Fallback
    } finally {
      btn.disabled = false;
      btn.innerHTML = originalBtnHTML;
    }
  });
</script>
</body>
</html>
