<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Research Paper Request Community</title>
    <!-- Tailwind CSS for rapid modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons for UI elements -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* CSS-based Animated Gradient Background (Much better performance than JS) */
        body {
            background: linear-gradient(-45deg, #6a11cb, #2575fc, #845ec2, #ff9671);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism utilities */
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            background: #ffffff;
            border-color: #6a11cb;
            box-shadow: 0 0 0 4px rgba(106, 17, 203, 0.2);
            outline: none;
        }

        /* Floating Shapes */
        .shape {
            position: absolute;
            background-repeat: no-repeat;
            background-size: contain;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
            transition: transform 0.2s ease-out;
        }
        
        /* Toast Animations */
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; transform: translateY(-10px); }
        }
        .toast-enter { animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .toast-exit { animation: fadeOut 0.3s ease forwards; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col relative">

    <!-- Background Shapes -->
    <div id="background-shapes" class="fixed inset-0 w-full h-full pointer-events-none overflow-hidden z-0">
        <div class="shape w-64 h-64 top-10 left-10 md:top-[10%] md:left-[20%]" 
             style="background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><g fill=%22%23ffffff%22><circle cx=%2240%22 cy=%2240%22 r=%2210%22/><circle cx=%2260%22 cy=%2250%22 r=%2212%22/><circle cx=%2250%22 cy=%2270%22 r=%2215%22/></g></svg>');">
        </div>
        <div class="shape w-80 h-80 bottom-5 right-5 md:bottom-[5%] md:right-[15%] opacity-10" 
             style="background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><path fill=%22%23ffffff%22 d=%22M10 50 q40 20 80 0 q-20 60 -80 0%22/></svg>');">
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-3"></div>

    <header class="bg-black/30 py-6 px-4 text-center relative z-10 shadow-md">
        <h1 class="text-3xl md:text-4xl font-bold tracking-tight">Research Vault Community</h1>
        <p class="text-yellow-300 font-semibold mt-2 flex items-center justify-center gap-2">
            <i data-lucide="users" class="w-5 h-5"></i>
            <span id="user-count">People helped so far: 0</span>
        </p>
    </header>

    <main class="flex-grow flex items-center justify-center p-6 relative z-10">
        <div class="glass-card w-full max-w-lg rounded-3xl p-8 shadow-2xl transform transition-all hover:shadow-[0_20px_50px_rgba(0,0,0,0.3)]">
            
            <div class="text-center mb-8">
                <h2 class="text-2xl font-bold mb-2">Request a Paper or Book</h2>
                <p class="text-white/80 text-sm">Fill out the details below. We'll find it and send it to your inbox.</p>
            </div>

            <form id="requestForm" action="https://formsubmit.co/researchvault.books@gmail.com" method="POST" class="space-y-5">
                <!-- FormSubmit Configuration -->
                <input type="hidden" name="_captcha" value="false" />
                <input type="hidden" name="_next" value="https://aliibraheemshash.github.io/thankyou.html" />

                <!-- Email Field -->
                <div>
                    <label for="email" class="block text-sm font-semibold mb-1 text-white/90 flex justify-between">
                        Your Email <span class="text-yellow-300 text-xs font-normal">(Required)</span>
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                            <i data-lucide="mail" class="w-5 h-5"></i>
                        </div>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" 
                               class="glass-input w-full pl-10 pr-4 py-3 rounded-xl text-gray-900 shadow-inner" />
                    </div>
                </div>

                <!-- DOI Field -->
                <div>
                    <label for="doi" class="block text-sm font-semibold mb-1 text-white/90 flex justify-between">
                        Paper DOI <span class="text-yellow-300 text-xs font-normal">(Auto-fills details)</span>
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                            <i data-lucide="link" class="w-5 h-5"></i>
                        </div>
                        <input type="text" id="doi" name="doi" placeholder="10.xxxx/xxxxx" autocomplete="off" 
                               class="glass-input w-full pl-10 pr-10 py-3 rounded-xl text-gray-900 shadow-inner" />
                        <div id="doi-loading" class="absolute inset-y-0 right-0 pr-3 flex items-center hidden text-blue-500">
                            <i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>
                        </div>
                    </div>
                </div>

                <!-- Title Field -->
                <div>
                    <label for="title" class="block text-sm font-semibold mb-1 text-white/90">Paper or Book Title</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                            <i data-lucide="book-open" class="w-5 h-5"></i>
                        </div>
                        <input type="text" id="title" name="title" placeholder="Enter full title" autocomplete="off" 
                               class="glass-input w-full pl-10 pr-4 py-3 rounded-xl text-gray-900 shadow-inner" />
                    </div>
                </div>

                <!-- Two Column Grid for ISBN and Author -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label for="isbn" class="block text-sm font-semibold mb-1 text-white/90">ISBN-10 (Books)</label>
                        <input type="text" id="isbn" name="isbn" placeholder="e.g. 1234567890" autocomplete="off" 
                               class="glass-input w-full px-4 py-3 rounded-xl text-gray-900 shadow-inner" />
                    </div>
                    <div>
                        <label for="author" class="block text-sm font-semibold mb-1 text-white/90">Author(s)</label>
                        <input type="text" id="author" name="author" placeholder="First Last" autocomplete="off" 
                               class="glass-input w-full px-4 py-3 rounded-xl text-gray-900 shadow-inner" />
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn" class="w-full mt-4 bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-bold py-4 px-6 rounded-xl shadow-lg transform transition-all hover:scale-[1.02] hover:shadow-xl flex justify-center items-center gap-2">
                    <i data-lucide="send" class="w-5 h-5"></i>
                    <span>Submit Request</span>
                </button>
            </form>
        </div>
    </main>

    <footer class="text-center py-6 text-white/70 text-sm relative z-10">
        &copy; 2025 Research Vault Community | Built to help researchers
    </footer>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Custom Toast Notification System
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            // Define colors and icons based on type
            let bgColor = 'bg-white';
            let textColor = 'text-gray-800';
            let icon = '<i data-lucide="info" class="w-5 h-5 text-blue-500"></i>';
            
            if (type === 'success') {
                icon = '<i data-lucide="check-circle" class="w-5 h-5 text-green-500"></i>';
            } else if (type === 'error') {
                icon = '<i data-lucide="alert-circle" class="w-5 h-5 text-red-500"></i>';
                bgColor = 'bg-red-50';
                textColor = 'text-red-800';
            }

            toast.className = `flex items-center gap-3 px-4 py-3 rounded-xl shadow-lg border border-black/10 toast-enter ${bgColor} ${textColor} min-w-[250px] max-w-sm`;
            toast.innerHTML = `
                <div>${icon}</div>
                <div class="font-medium text-sm flex-grow">${message}</div>
                <button onclick="this.parentElement.remove()" class="text-gray-400 hover:text-gray-600 transition-colors">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            `;

            container.appendChild(toast);
            lucide.createIcons({ root: toast });

            // Auto remove after 5 seconds
            setTimeout(() => {
                if (toast.parentElement) {
                    toast.classList.replace('toast-enter', 'toast-exit');
                    setTimeout(() => toast.remove(), 300);
                }
            }, 5000);
        }

        // Parallax Effect for Background Shapes
        const shapes = document.querySelectorAll('.shape');
        document.body.addEventListener('mousemove', e => {
            const x = (e.clientX / window.innerWidth - 0.5) * 2;
            const y = (e.clientY / window.innerHeight - 0.5) * 2;
            
            shapes.forEach((shape, idx) => {
                const movement = 20 + (idx * 15);
                const translateX = x * movement * (idx % 2 === 0 ? 1 : -1);
                const translateY = y * movement * (idx % 2 === 0 ? 1 : -1);
                shape.style.transform = `translate(${translateX}px, ${translateY}px)`;
            });
        });

        // Autofill form fields based on DOI using Crossref API
        async function fetchMetadataByDOI(doi) {
            if (!doi) return;
            
            const loadingIcon = document.getElementById('doi-loading');
            loadingIcon.classList.remove('hidden');

            const url = `https://api.crossref.org/works/${encodeURIComponent(doi)}`;
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('DOI not found');
                
                const data = await response.json();
                const item = data.message;
                
                if (item.title && item.title.length > 0) {
                    document.getElementById('title').value = item.title[0];
                }
                
                if (item.author && item.author.length > 0) {
                    const authors = item.author.map(a => `${a.given || ''} ${a.family || ''}`.trim()).join(', ');
                    document.getElementById('author').value = authors;
                }
                
                showToast('Details auto-filled successfully!', 'success');
            } catch (error) {
                console.warn('Metadata fetch failed:', error);
                // We don't show a blocking error, just a subtle notification so they can manual enter
                showToast('Could not auto-fetch details. Please enter manually.', 'info');
            } finally {
                loadingIcon.classList.add('hidden');
            }
        }

        // Trigger DOI lookup on blur (when user clicks away from the field)
        document.getElementById('doi').addEventListener('blur', (e) => {
            const doiInput = e.target.value.trim();
            if (doiInput) {
                fetchMetadataByDOI(doiInput);
            }
        });

        // Local Storage Tracking for Counter
        const countEl = document.getElementById('user-count');
        let submissionCount = Number(localStorage.getItem('submissionCount')) || 0;
        
        function updateCountDisplay() {
            countEl.textContent = `People helped so far: ${submissionCount}`;
        }
        updateCountDisplay();

        // Unified Form Submission Handler
        const form = document.getElementById('requestForm');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async function(event) {
            event.preventDefault(); // Prevent standard page redirect

            const doi = document.getElementById('doi').value.trim();
            const isbn = document.getElementById('isbn').value.trim();
            const title = document.getElementById('title').value.trim();

            // Validation: Require at least one identifying piece of info
            if (!doi && !isbn && !title) {
                showToast('Please provide a DOI, ISBN, or Title so we can find your request.', 'error');
                return;
            }

            // UI feedback during submission
            const originalBtnHtml = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i><span>Submitting...</span>';
            submitBtn.disabled = true;
            lucide.createIcons({ root: submitBtn });

            try {
                const formData = new FormData(form);
                
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (response.ok) {
                    showToast('Request submitted successfully! We will email you soon.', 'success');
                    form.reset();
                    
                    // Update local counter
                    submissionCount++;
                    localStorage.setItem('submissionCount', submissionCount);
                    updateCountDisplay();
                } else {
                    throw new Error('Server responded with an error');
                }
            } catch (error) {
                console.error('Submission error:', error);
                showToast('Network error submitting request. Please try again.', 'error');
            } finally {
                // Restore button state
                submitBtn.innerHTML = originalBtnHtml;
                submitBtn.disabled = false;
                lucide.createIcons({ root: submitBtn });
            }
        });
    </script>
</body>
</html>
