<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Research Paper Request Community</title>
  <style>
    /* Modern Sans-Serif Stack */
    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #fff;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
      /* Initial Background */
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
    }

    #background-shapes {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 0;
    }

    .shape {
      position: absolute;
      opacity: 0.12;
      will-change: transform;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
    }

    .shape1 {
      width: 350px; height: 350px;
      top: 5%; left: 10%;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><g fill="%23ffffff"><circle cx="40" cy="40" r="10"/><circle cx="60" cy="50" r="12"/><circle cx="50" cy="70" r="15"/></g></svg>') no-repeat;
    }

    .shape2 {
      width: 300px; height: 300px;
      bottom: 10%; right: 10%;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path fill="%23ffffff" d="M10 50 q40 20 80 0 q-20 60 -80 0"/></svg>') no-repeat;
    }

    header {
      background-color: rgba(0,0,0,0.25);
      padding: 25px 0;
      text-align: center;
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      position: relative;
      z-index: 2;
      backdrop-filter: blur(5px);
    }

    #user-count {
      text-align: center;
      margin: 15px 0;
      font-size: 1rem;
      font-weight: 700;
      color: #ffd700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      position: relative;
      z-index: 2;
    }

    main {
      width: 90%;
      max-width: 480px;
      margin: 0 auto 50px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      padding: 35px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      position: relative;
      z-index: 3;
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
    }

    .input-group { margin-bottom: 18px; }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #f8fafc;
    }

    .label-hint { color: #ffd700; font-weight: 400; font-size: 0.8rem; }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.9);
      color: #1e293b;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: #ffd700;
      box-shadow: 0 0 0 4px rgba(255, 215, 0, 0.2);
    }

    button {
      margin-top: 25px;
      width: 100%;
      padding: 16px;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      background: linear-gradient(45deg, #4f46e5, #9333ea);
      box-shadow: 0 10px 20px rgba(79, 70, 229, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(79, 70, 229, 0.5);
    }

    button:active { transform: translateY(0); }

    .footer {
      margin-top: auto;
      text-align: center;
      padding: 30px 0;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.6);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      position: relative;
      z-index: 2;
    }
  </style>
</head>
<body>

<div id="background-shapes">
  <div class="shape shape1"></div>
  <div class="shape shape2"></div>
</div>

<header>Research Vault</header>

<div id="user-count">People helped so far: 0</div>

<main>
  <form id="requestForm" action="https://formsubmit.co/researchvault.books@gmail.com" method="POST">
    <input type="hidden" name="_captcha" value="false" />
    <input type="hidden" name="_template" value="table" />
    <input type="hidden" name="_next" value="https://aliibraheemshash.github.io/thankyou.html" />

    <div class="input-group">
      <label for="email">Your Email <span class="label-hint">(Required)</span></label>
      <input type="email" id="email" name="email" placeholder="example@example.com" required autocomplete="email" />
    </div>

    <div class="input-group">
      <label for="doi">Paper DOI <span class="label-hint">(Autofills Title)</span></label>
      <input type="text" id="doi" name="doi" placeholder="10.xxxx/xxxxx" />
    </div>

    <div class="input-group">
      <label for="title">Paper or Book Title</label>
      <input type="text" id="title" name="title" placeholder="Enter title" />
    </div>

    <div class="input-group">
      <label for="isbn">Book ISBN-10</label>
      <input type="text" id="isbn" name="isbn" placeholder="e.g. 1234567890" />
    </div>

    <div class="input-group">
      <label for="author">Author Name(s)</label>
      <input type="text" id="author" name="author" placeholder="First Last" />
    </div>

    <button type="submit" id="submitBtn">Submit Request</button>
  </form>
</main>

<div class="footer">
  &copy; 2026 Research Community | Made with care
</div>

<script>
  // --- 1. BACKGROUND & SHAPE ANIMATION ---
  const shapes = document.querySelectorAll('.shape');
  let mouseX = 0, mouseY = 0;
  let angle = 0;

  document.addEventListener('mousemove', e => {
    mouseX = (e.clientX / window.innerWidth) - 0.5;
    mouseY = (e.clientY / window.innerHeight) - 0.5;
  });

  function animate() {
    angle += 0.015;
    shapes.forEach((shape, idx) => {
      const movement = 40 + (idx * 20);
      const floatX = Math.sin(angle + idx) * 10;
      const floatY = Math.cos(angle + idx) * 10;

      const tx = (mouseX * movement) + floatX;
      const ty = (mouseY * movement) + floatY;

      shape.style.transform = `translate3d(${tx}px, ${ty}px, 0) rotate(${angle * 5}deg)`;
    });
    requestAnimationFrame(animate);
  }
  animate();

  // --- 2. SMOOTH BACKGROUND COLOR BLENDING ---
  const colors = [
    ['#6a11cb', '#2575fc'], ['#ff6a00', '#ee0979'],
    ['#00b09b', '#96c93d'], ['#845ec2', '#d65db1']
  ];
  let colorIdx = 0, nextIdx = 1, step = 0;

  function updateBg() {
    step += 0.002;
    if (step >= 1) {
      step = 0;
      colorIdx = nextIdx;
      nextIdx = (nextIdx + 1) % colors.length;
    }
    const blend = (c1, c2, t) => {
      const r = (h) => parseInt(h.slice(1, 3), 16);
      const g = (h) => parseInt(h.slice(3, 5), 16);
      const b = (h) => parseInt(h.slice(5, 7), 16);
      const mix = (s, e) => Math.round(s + t * (e - s));
      return `rgb(${mix(r(c1), r(c2))}, ${mix(g(c1), g(c2))}, ${mix(b(c1), b(c2))})`;
    };
    const cA = blend(colors[colorIdx][0], colors[nextIdx][0], step);
    const cB = blend(colors[colorIdx][1], colors[nextIdx][1], step);
    document.body.style.background = `linear-gradient(135deg, ${cA} 0%, ${cB} 100%)`;
    requestAnimationFrame(updateBg);
  }
  updateBg();

  // --- 3. METADATA FETCHING ---
  document.getElementById('doi').addEventListener('blur', async (e) => {
    const doi = e.target.value.trim();
    if (!doi) return;
    try {
      const response = await fetch(`https://api.crossref.org/works/${encodeURIComponent(doi)}`);
      if (response.ok) {
        const data = await response.json();
        const item = data.message;
        document.getElementById('title').value = item.title ? item.title[0] : '';
        if (item.author) document.getElementById('author').value = item.author.map(a => `${a.given} ${a.family}`).join(', ');
      }
    } catch (err) { console.error('Metadata fetch failed'); }
  });

  // --- 4. SUBMISSION LOGIC ---
  const form = document.getElementById('requestForm');
  const countEl = document.getElementById('user-count');
  let submissionCount = Number(localStorage.getItem('submissionCount')) || 0;

  function updateCount() { countEl.textContent = `People helped so far: ${submissionCount}`; }
  updateCount();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const doi = document.getElementById('doi').value.trim();
    const isbn = document.getElementById('isbn').value.trim();
    const title = document.getElementById('title').value.trim();

    if (!doi && !isbn && !title) {
      alert('Please provide at least a DOI, ISBN, or Title.');
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = "Sending Request...";

    try {
      const response = await fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      });

      if (response.ok) {
        alert('Request submitted! We will respond shortly.');
        submissionCount++;
        localStorage.setItem('submissionCount', submissionCount);
        updateCount();
        form.reset();
      } else {
        alert('Submission failed. Trying standard method...');
        form.submit(); // Fallback to standard POST
      }
    } catch (err) {
      form.submit(); // Fallback to standard POST
    } finally {
      btn.disabled = false;
      btn.textContent = "Submit Request";
    }
  });
</script>
</body>
</html>
